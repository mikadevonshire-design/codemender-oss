# Google Cloud Security Command Center (SCC) Posture Management
# NERC-CIP (North American Electric Reliability Corporation Critical Infrastructure Protection)
# Custom Posture Definition for Project: manufacturing-demo-486618
#
# References NERC CIP standards:
# - CIP-003-8: Security Management Controls
# - CIP-004-6: Personnel & Training / Access Control
# - CIP-005-6: Electronic Security Perimeter(s)
# - CIP-007-6: Systems Security Management

name: organizations/123456789012/locations/global/postures/nerc_cip_high_security
revision_id: v1.0.0
state: ACTIVE
description: "NERC-CIP Critical Infrastructure Protection posture baseline enforcing Electronic Security Perimeters, Systems Security Management, and Access Controls for manufacturing-demo-486618."

policy_sets:
  # ---------------------------------------------------------------------------
  # CIP-005-6: Electronic Security Perimeter (Network & Firewall Security)
  # ---------------------------------------------------------------------------
  - policy_set_id: nerc_cip_005_electronic_security_perimeter
    description: "Enforces network perimeters, restricts public ingress, and ensures firewall logging."
    policies:
      - policy_id: restrict_public_ip_access_compute
        compliance_standards:
          - standard: NERC-CIP
            control: CIP-005-6 R1 (Electronic Security Perimeter)
        constraint:
          org_policy_constraint:
            canned_constraint_id: compute.vmExternalIpAccess
            policy_rules:
              - deny_all: true

      - policy_id: detect_open_firewall_ssh_rdp
        compliance_standards:
          - standard: NERC-CIP
            control: CIP-005-6 R2 (Interactive Remote Access)
        security_health_analytics_module:
          module_enablement_state: ENABLED
          module_name: OPEN_FIREWALL

  # ---------------------------------------------------------------------------
  # CIP-007-6: Systems Security Management (Hardening, Logging & Encryption)
  # ---------------------------------------------------------------------------
  - policy_set_id: nerc_cip_007_systems_security_management
    description: "Hardens compute resources, mandates Shielded VMs, OS Login, and full audit logging."
    policies:
      - policy_id: require_shielded_vm
        compliance_standards:
          - standard: NERC-CIP
            control: CIP-007-6 R1 (Ports and Services Hardening)
        constraint:
          org_policy_constraint:
            canned_constraint_id: compute.requireShieldedVm
            policy_rules:
              - enforce: true

      - policy_id: require_os_login
        compliance_standards:
          - standard: NERC-CIP
            control: CIP-007-6 R5 (System Access Control)
        constraint:
          org_policy_constraint:
            canned_constraint_id: compute.requireOsLogin
            policy_rules:
              - enforce: true

      - policy_id: detect_audit_logging_disabled
        compliance_standards:
          - standard: NERC-CIP
            control: CIP-007-6 R4 (Security Event Monitoring)
        security_health_analytics_module:
          module_enablement_state: ENABLED
          module_name: AUDIT_LOGGING_DISABLED

  # ---------------------------------------------------------------------------
  # CIP-003-8: Security Management & Storage Protection
  # ---------------------------------------------------------------------------
  - policy_set_id: nerc_cip_003_storage_protection
    description: "Prevents public data exposure and enforces uniform access controls on Cloud Storage."
    policies:
      - policy_id: enforce_public_access_prevention
        compliance_standards:
          - standard: NERC-CIP
            control: CIP-003-8 R2 (Information Protection)
        constraint:
          org_policy_constraint:
            canned_constraint_id: storage.publicAccessPrevention
            policy_rules:
              - enforce: true

      - policy_id: enforce_uniform_bucket_level_access
        compliance_standards:
          - standard: NERC-CIP
            control: CIP-003-8 R2 (Information Protection)
        constraint:
          org_policy_constraint:
            canned_constraint_id: storage.uniformBucketLevelAccess
            policy_rules:
              - enforce: true
